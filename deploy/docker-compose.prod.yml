services:
  bot:
    image: ${IMAGE_REPOSITORY:?set IMAGE_REPOSITORY}:${IMAGE_TAG:-latest}
    user: ${BOT_UID:?set BOT_UID}:${BOT_GID:?set BOT_GID}
    container_name: noodswap-bot
    restart: unless-stopped
    env_file:
      - ./runtime.env
    environment:
      - NOODSWAP_DB_PATH=/app/assets/noodswap.db
      - NOODSWAP_CARD_FONTS_DIR=/app/assets/card_fonts
      - NOODSWAP_CARD_IMAGES_DIR=/app/assets/card_images
    volumes:
      - ./assets:/app/assets
