services:
  bot:
    image: ${IMAGE_REPOSITORY:?set IMAGE_REPOSITORY}:${IMAGE_TAG:-latest}
    user: ${BOT_UID:?set BOT_UID}:${BOT_GID:?set BOT_GID}
    container_name: noodswap-bot
    restart: unless-stopped
    env_file:
      - ./runtime.env
    volumes:
      - ./data/noodswap.db:/app/noodswap.db
      - ./data/card_images:/app/assets/card_images
