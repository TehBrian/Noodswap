name: Deploy

on:
  workflow_run:
    workflows:
      - CD
    types:
      - completed

permissions:
  contents: read
  packages: read

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest

    env:
      IMAGE_REPOSITORY: ${{ vars.DEPLOY_IMAGE_REPOSITORY }}
      IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
      DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
      DEPLOY_SSH_KNOWN_HOSTS: ${{ secrets.DEPLOY_SSH_KNOWN_HOSTS }}
      DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
      DEPLOY_AS_USER: ${{ vars.DEPLOY_AS_USER }}
      GHCR_USERNAME: ${{ secrets.GHCR_READONLY_USERNAME }}
      GHCR_TOKEN: ${{ secrets.GHCR_READONLY_TOKEN }}

    steps:
      - name: Validate required config
        shell: bash
        run: |
          set -euo pipefail
          required=(IMAGE_REPOSITORY IMAGE_TAG DEPLOY_HOST DEPLOY_SSH_USER DEPLOY_SSH_PRIVATE_KEY DEPLOY_SSH_KNOWN_HOSTS DEPLOY_PATH DEPLOY_AS_USER GHCR_USERNAME GHCR_TOKEN)
          for name in "${required[@]}"; do
            if [ -z "${!name:-}" ]; then
              echo "Missing required secret/variable: ${name}" >&2
              exit 1
            fi
          done
          if [ -z "${DEPLOY_SSH_PORT:-}" ]; then
            echo "Missing required secret/variable: DEPLOY_SSH_PORT" >&2
            exit 1
          fi

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ env.GHCR_USERNAME }}
          password: ${{ env.GHCR_TOKEN }}

      - name: Wait for image
        shell: bash
        run: |
          set -euo pipefail
          image_ref="${IMAGE_REPOSITORY}:${IMAGE_TAG}"
          echo "Waiting for ${image_ref}"
          for attempt in $(seq 1 30); do
            if docker manifest inspect "${image_ref}" >/dev/null 2>&1; then
              echo "Image available: ${image_ref}"
              exit 0
            fi
            echo "Not available yet (${attempt}/30), retrying in 10s"
            sleep 10
          done
          echo "Timed out waiting for ${image_ref}" >&2
          exit 1

      - name: Configure SSH
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          printf '%s\n' "${DEPLOY_SSH_PRIVATE_KEY}" > "$HOME/.ssh/id_ed25519"
          chmod 600 "$HOME/.ssh/id_ed25519"
          printf '%s\n' "${DEPLOY_SSH_KNOWN_HOSTS}" > "$HOME/.ssh/known_hosts"
          chmod 644 "$HOME/.ssh/known_hosts"

      - name: Deploy on server
        shell: bash
        run: |
          set -euo pipefail

          ghcr_token_b64="$(printf '%s' "${GHCR_TOKEN}" | base64 | tr -d '\n')"

          ssh -i "$HOME/.ssh/id_ed25519" \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile="$HOME/.ssh/known_hosts" \
            -p "${DEPLOY_SSH_PORT}" \
            "${DEPLOY_SSH_USER}@${DEPLOY_HOST}" \
            "DEPLOY_PATH='${DEPLOY_PATH}' DEPLOY_AS_USER='${DEPLOY_AS_USER}' IMAGE_REPOSITORY='${IMAGE_REPOSITORY}' IMAGE_TAG='${IMAGE_TAG}' GHCR_USERNAME='${GHCR_USERNAME}' GHCR_TOKEN_B64='${ghcr_token_b64}' bash -se" <<'EOF'
          set -euo pipefail

          run_as_deploy_user() {
            if [ "$(id -un)" = "${DEPLOY_AS_USER}" ]; then
              "$@"
            else
              sudo -n -u "${DEPLOY_AS_USER}" "$@"
            fi
          }

          GHCR_TOKEN="$(printf '%s' "${GHCR_TOKEN_B64}" | base64 -d)"

          if [ ! -d "${DEPLOY_PATH}/.git" ]; then
            echo "Deploy path is not a git checkout: ${DEPLOY_PATH}" >&2
            exit 1
          fi

          git -C "${DEPLOY_PATH}" fetch --prune origin
          git -C "${DEPLOY_PATH}" checkout -f "${IMAGE_TAG}"

          deploy_script="${DEPLOY_PATH}/deploy/update.sh"
          if [ ! -x "${deploy_script}" ]; then
            echo "Deploy script missing or not executable: ${deploy_script}" >&2
            exit 1
          fi

          printf '%s' "${GHCR_TOKEN}" | run_as_deploy_user docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin
          run_as_deploy_user "${deploy_script}" --image-repository "${IMAGE_REPOSITORY}" --image-tag "${IMAGE_TAG}"

          expected_image="${IMAGE_REPOSITORY}:${IMAGE_TAG}"
          actual_image=$(run_as_deploy_user docker inspect --format '{{.Config.Image}}' noodswap-bot)
          if [ "${actual_image}" != "${expected_image}" ]; then
            echo "Running image mismatch: expected ${expected_image}, got ${actual_image}" >&2
            exit 1
          fi

          echo "Deploy verified: ${actual_image}"
          EOF
