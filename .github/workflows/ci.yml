name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Pylint
        run: python -m pylint noodswap scripts tests --score=n

      - name: Compile check
        run: python -m py_compile bot.py noodswap/*.py scripts/*.py tests/*.py

      - name: Migration smoke check
        run: python scripts/migration_smoke.py

      - name: Unit tests
        run: python -m unittest discover -s tests -p 'test_*.py'
