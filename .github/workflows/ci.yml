name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --group dev

      - name: Ruff
        run: uv run ruff check bot scripts tests

      - name: Compile check
        run: uv run python -m py_compile bot/main.py bot/*.py scripts/*.py tests/*.py

      - name: Migration smoke check
        run: uv run python scripts/migration_smoke.py

      - name: Unit tests
        run: uv run pytest tests -v --tb=short
